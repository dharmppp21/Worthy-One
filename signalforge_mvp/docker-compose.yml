version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signalforge-backend
    environment:
      - DATABASE_URL=postgresql://signalforge:signalforge@postgres:5432/signalforge
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=info
      - SERVICE_PORT=8000
      # Auto-discovery: scan the Docker daemon for running containers. The
      # process provider is left out here because inside the container it would
      # only see the container's own PID namespace.
      - SIGNALFORGE_DISCOVERY_ENABLED=true
      - SIGNALFORGE_DISCOVERY_PROVIDERS=docker,config
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Read-only Docker socket so the DockerDiscoveryProvider can list the
      # running containers (postgres, redis, frontend, itself).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signalforge-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  # Demo traffic generator. Gated behind the `simulator` profile so a plain
  # `docker compose up` does NOT start it — it drives a scripted cascading-
  # failure scenario into the backend so the dashboard, incident engine and
  # dependency graph have real data to show. Start it with:
  #   docker compose --profile simulator up -d --build    (or: make demo)
  # It waits for the backend to be reachable before it starts emitting.
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: signalforge-simulator
    profiles:
      - simulator
    environment:
      - API_URL=http://backend:8000/ingest
      - API_KEY=sf-api-key-demo
      - TENANT_ID=demo-company
      - EVENT_INTERVAL=0.25
      - NORMAL_EVENTS=50
      # Run continuously by default; set a positive value for a bounded run.
      - TOTAL_EVENTS=0
    depends_on:
      - backend
    restart: "no"

  postgres:
    # pgvector-enabled Postgres 16 â€” the embeddings migration requires the
    # `vector` extension, which stock postgres:16-alpine does not ship.
    image: pgvector/pgvector:pg16
    container_name: signalforge-postgres
    environment:
      POSTGRES_USER: signalforge
      POSTGRES_PASSWORD: signalforge
      POSTGRES_DB: signalforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signalforge-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
