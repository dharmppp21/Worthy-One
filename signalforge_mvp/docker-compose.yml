version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signalforge-backend
    environment:
      - DATABASE_URL=postgresql://signalforge:signalforge@postgres:5432/signalforge
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LOG_LEVEL=info
      - SERVICE_PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signalforge-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  postgres:
    # pgvector-enabled Postgres 16 â€” the embeddings migration requires the
    # `vector` extension, which stock postgres:16-alpine does not ship.
    image: pgvector/pgvector:pg16
    container_name: signalforge-postgres
    environment:
      POSTGRES_USER: signalforge
      POSTGRES_PASSWORD: signalforge
      POSTGRES_DB: signalforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signalforge-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
