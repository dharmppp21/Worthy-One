services:
  postgres:
    image: postgres:16-alpine
    container_name: signforge-postgres
    environment:
      POSTGRES_USER: signforge
      POSTGRES_PASSWORD: signforge
      POSTGRES_DB: signforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signforge -d signforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: signforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: signforge-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signforge-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://signforge:signforge@postgres:5432/signforge
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:9092
      LOG_LEVEL: INFO
      ENVIRONMENT: production
      RATE_LIMIT_RPS: "200"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signforge-frontend
    ports:
      - "80:80"
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: signforge-simulator
    environment:
      API_URL: http://backend:8000
      TENANT_ID: demo-company
      PHASES: "100"
      INTERVAL: "0.1"
    depends_on:
      - backend
    profiles:
      - simulator
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
