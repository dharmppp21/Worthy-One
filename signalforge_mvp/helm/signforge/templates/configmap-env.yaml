apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "signforge.fullname" . }}-env
  labels:
    {{- include "signforge.labels" . | nindent 4 }}
data:
  LOG_LEVEL: "info"
  SERVICE_PORT: {{ .Values.service.port | quote }}
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
